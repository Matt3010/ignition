name: CI

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Check package-lock registry portability
        run: bash ../.github/check-package-lock-registry.sh package-lock.json

      - name: Install dependencies
        run: bash ../.github/npm-ci.sh

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit and mocked integration tests
        run: npm test -- --reporter=default

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Bash syntax
        run: find scripts -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n

  swift-syntax:
    name: Swift syntax
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Parse Swift sources
        shell: bash
        run: |
          found=0
          while IFS= read -r -d '' file; do
            found=1
            swiftc -parse "$file"
          done < <(find . -type f -name '*.swift' -print0)
          if [[ "$found" -eq 0 ]]; then
            echo "No Swift files found"
          fi

  postgis:
    name: PostgreSQL/PostGIS integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: road_context
          POSTGRES_USER: road
          POSTGRES_PASSWORD: road
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U road -d road_context"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://road:road@127.0.0.1:5432/road_context
      RUN_DB_INTEGRATION: '1'
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Check package-lock registry portability
        run: bash ../.github/check-package-lock-registry.sh package-lock.json

      - name: Install dependencies
        run: bash ../.github/npm-ci.sh

      - name: Build
        run: npm run build

      - name: Run migrations
        run: npm run migrate

      - name: Run live PostGIS tests
        run: npx vitest run tests/live/postgis-live.test.ts --reporter=verbose

  valhalla:
    name: Valhalla real map matching
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      RUN_VALHALLA_INTEGRATION: '1'
      VALHALLA_DOCKER_IMAGE: ghcr.io/gis-ops/docker-valhalla/valhalla:3.5.1
      VALHALLA_DOCKER_PLATFORM: linux/amd64
      VALHALLA_BASE_URL: http://127.0.0.1:8002
      OSM_REGIONS: monaco
      OSM_DATA_DIR: ./data/osm
      VALHALLA_TILE_DIR: ./data/valhalla-ci
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Check package-lock registry portability
        run: bash ../.github/check-package-lock-registry.sh package-lock.json

      - name: Install dependencies
        run: bash ../.github/npm-ci.sh

      - name: Install Valhalla timezone build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends spatialite-bin sqlite3 unzip

      - name: Pull pinned Valhalla image
        run: docker pull "${VALHALLA_DOCKER_IMAGE}"

      - name: Download Monaco OSM extract
        run: |
          mkdir -p "${OSM_DATA_DIR}"
          curl --fail --location --retry 4 --retry-all-errors \
            --output "${OSM_DATA_DIR}/${OSM_REGIONS}.osm.pbf" \
            https://download.geofabrik.de/europe/monaco-latest.osm.pbf

      - name: Build Valhalla tiles
        run: npm run valhalla:build

      - name: Start Valhalla
        run: |
          docker run --detach --rm \
            --name ignition-ci-valhalla \
            --platform "${VALHALLA_DOCKER_PLATFORM}" \
            --publish 8002:8002 \
            --entrypoint valhalla_service \
            --volume "$(pwd)/data/valhalla-ci:/custom_files" \
            "${VALHALLA_DOCKER_IMAGE}" \
            /custom_files/valhalla.json 1

      - name: Wait for Valhalla
        run: |
          for attempt in $(seq 1 90); do
            if curl --fail --silent http://127.0.0.1:8002/status >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs ignition-ci-valhalla
          exit 1

      - name: Run live Valhalla tests
        run: npx vitest run tests/live/valhalla-live.test.ts --reporter=verbose

      - name: Upload Valhalla logs on failure
        if: failure()
        run: docker logs ignition-ci-valhalla > valhalla-ci.log 2>&1 || true

      - name: Publish failure logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: valhalla-ci-logs
          path: backend/valhalla-ci.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop Valhalla
        if: always()
        run: docker stop ignition-ci-valhalla || true

  publish-image:
    name: Publish application image
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/master' ||
       startsWith(github.ref, 'refs/tags/v'))
    needs: [backend, swift-syntax, postgis, valhalla]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Normalize image name
        id: image
        shell: bash
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "name=${image_name}" >> "$GITHUB_OUTPUT"
          echo "Publishing ${image_name}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=Ignition road-context backend
            org.opencontainers.image.description=Backend and OSM maintenance runtime for Ignition

      - name: Build and push multi-platform image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ignition-runtime
          cache-to: type=gha,mode=max,scope=ignition-runtime
          provenance: mode=max
          sbom: true

      - name: Verify the published image
        shell: bash
        run: |
          image_ref="${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}"
          docker pull "$image_ref"
          docker run --rm --entrypoint node "$image_ref" -e "
            const fs = require('node:fs');
            const required = [
              '/app/dist/src/server.js',
              '/app/dist/scripts/migrate.js',
              '/app/scripts/refresh-osm.sh',
              '/app/migrations/0001_init.sql'
            ];
            const missing = required.filter((file) => !fs.existsSync(file));
            if (missing.length) {
              console.error('Missing runtime files:', missing);
              process.exit(1);
            }
            console.log('Published image contains all required runtime files');
          "

      - name: Write publish summary
        shell: bash
        run: |
          {
            echo "## Container image published"
            echo
            echo "**Image:** ${{ steps.image.outputs.name }}"
            echo "**Digest:** ${{ steps.build.outputs.digest }}"
            echo
            echo "Use backend/docker-compose.registry.yml for a source-free deployment."
          } >> "$GITHUB_STEP_SUMMARY"

