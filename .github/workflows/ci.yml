name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: ../.github/npm-ci.sh

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit and mocked integration tests
        run: npm test -- --reporter=default

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Bash syntax
        run: find scripts -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n

  swift-syntax:
    name: Swift syntax
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Parse Swift sources
        shell: bash
        run: |
          found=0
          while IFS= read -r -d '' file; do
            found=1
            swiftc -parse "$file"
          done < <(find . -type f -name '*.swift' -print0)
          if [[ "$found" -eq 0 ]]; then
            echo "No Swift files found"
          fi
