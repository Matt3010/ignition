services:
  backend:
    build:
      context: .
    platform: linux/arm64/v8
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      DATABASE_URL: postgres://road:road@postgres:5432/road_context
      VALHALLA_BASE_URL: http://valhalla:8002
      ROAD_CONTEXT_PROVIDER: valhalla
      REQUEST_TIMEOUT_MS: ${REQUEST_TIMEOUT_MS:-5000}
      VALHALLA_TIMEOUT_MS: ${VALHALLA_TIMEOUT_MS:-2500}
      MAX_GPS_ACCURACY_METERS: ${MAX_GPS_ACCURACY_METERS:-50}
      ALERT_SEARCH_RADIUS_METERS: ${ALERT_SEARCH_RADIUS_METERS:-1500}
      ALERT_BEHIND_MIN_ANGLE_DEGREES: ${ALERT_BEHIND_MIN_ANGLE_DEGREES:-135}
      ALERT_BEHIND_IMMEDIATE_ANGLE_DEGREES: ${ALERT_BEHIND_IMMEDIATE_ANGLE_DEGREES:-170}
      ALERT_BEHIND_MIN_SPEED_KMH: ${ALERT_BEHIND_MIN_SPEED_KMH:-5}
      ALERT_BEHIND_MAX_GPS_ACCURACY_METERS: ${ALERT_BEHIND_MAX_GPS_ACCURACY_METERS:-25}
      ALERT_BEHIND_MIN_DISTANCE_INCREASE_METERS: ${ALERT_BEHIND_MIN_DISTANCE_INCREASE_METERS:-5}
      SESSION_TRACE_TTL_SECONDS: ${SESSION_TRACE_TTL_SECONDS:-180}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      PAYLOAD_LIMIT_BYTES: ${PAYLOAD_LIMIT_BYTES:-65536}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-180}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-1 minute}
      MIN_CLIENT_INTERVAL_MS: ${MIN_CLIENT_INTERVAL_MS:-1000}
      API_VERSION: ${API_VERSION:-1.0.0}
      OSM_EXTRACT_PRESET: ${OSM_EXTRACT_PRESET:-italy}
      OSM_EXTRACT_URL: ${OSM_EXTRACT_URL:-}
      OSM_REGION: ${OSM_REGION:-italy}
      OSM_DATA_DIR: /app/data/osm
      OSM_HOST_DATA_DIR: ${OSM_HOST_DATA_DIR:-${PWD}/data/osm}
      VALHALLA_TILE_DIR: /app/data/valhalla
      APP_DEBUG_LOG_DIR: /app/reports/app-debug-logs
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
      valhalla:
        condition: service_healthy
    networks:
      - road-context
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  osm-refresh:
    build:
      context: .
    platform: linux/arm64/v8
    restart: unless-stopped
    profiles: ["maintenance"]
    command: ["npm", "run", "osm:refresh:loop"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://road:road@postgres:5432/road_context
      OSM_EXTRACT_PRESET: ${OSM_EXTRACT_PRESET:-italy}
      OSM_EXTRACT_URL: ${OSM_EXTRACT_URL:-}
      OSM_REGION: ${OSM_REGION:-italy}
      OSM_DATA_DIR: /app/data/osm
      OSM_HOST_DATA_DIR: ${OSM_HOST_DATA_DIR:-${PWD}/data/osm}
      VALHALLA_TILE_DIR: /app/data/valhalla
      VALHALLA_STAGING_TILE_DIR: /app/data/valhalla.next
      VALHALLA_STAGING_BUILD_HOST_TILE_DIR: ${VALHALLA_STAGING_BUILD_HOST_TILE_DIR:-${PWD}/data/valhalla.next}
      VALHALLA_CONTAINER_NAME: road-context-valhalla
      OSM_REFRESH_INTERVAL_SECONDS: ${OSM_REFRESH_INTERVAL_SECONDS:-86400}
      OSM_REFRESH_RUN_ON_START: ${OSM_REFRESH_RUN_ON_START:-false}
      OSM_REFRESH_RESTART_VALHALLA: ${OSM_REFRESH_RESTART_VALHALLA:-true}
      OSM_REFRESH_IMPORT_ALERTS: ${OSM_REFRESH_IMPORT_ALERTS:-true}
      OSM_REFRESH_LOCK_TIMEOUT_SECONDS: ${OSM_REFRESH_LOCK_TIMEOUT_SECONDS:-3600}
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      valhalla:
        condition: service_healthy
    networks:
      - road-context

  postgres:
    build:
      context: ./docker/postgres
    platform: linux/arm64/v8
    restart: unless-stopped
    environment:
      POSTGRES_DB: road_context
      POSTGRES_USER: road
      POSTGRES_PASSWORD: road
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    networks:
      - road-context
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U road -d road_context"]
      interval: 10s
      timeout: 5s
      retries: 5

  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
    container_name: road-context-valhalla
    platform: linux/arm64/v8
    entrypoint: ["valhalla_service"]
    command: ["/custom_files/valhalla.json", "1"]
    restart: unless-stopped
    environment:
      server_threads: 2
      serve_tiles: "true"
      build_elevation: "false"
      build_admins: "false"
      build_time_zones: "false"
      force_rebuild: "false"
    volumes:
      - ${VALHALLA_TILE_DIR:-./data/valhalla}:/custom_files
    ports:
      - "127.0.0.1:8002:8002"
    networks:
      - road-context
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8002/status >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

networks:
  road-context:
    driver: bridge
